<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eigendecomposition</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--bg2:#171b26;--bg3:#1e2333;
  --br:rgba(255,255,255,0.08);--br2:rgba(255,255,255,0.15);
  --tx:#e2e4ec;--tx2:#8b90a0;--tx3:#555a6a;
  --o:#F6AD55;--p:#C084FC;--g:#48BB78;--r:#FC8181;
  --mono:'JetBrains Mono',monospace;--rad:10px;--rsm:6px;
}
@media(prefers-color-scheme:light){:root{
  --bg:#f4f5f8;--bg2:#fff;--bg3:#eceef3;
  --br:rgba(0,0,0,0.08);--br2:rgba(0,0,0,0.15);
  --tx:#1a1d2e;--tx2:#5a5f72;--tx3:#a0a5b5;
  --o:#D97706;--p:#9333EA;--g:#16A34A;--r:#DC2626;
}}
html,body{background:var(--bg);color:var(--tx);font-family:var(--mono);font-size:13px;}
body{display:flex;flex-direction:column;padding:14px;gap:10px;}

h1{font-size:12px;font-weight:500;color:var(--tx2);letter-spacing:.08em;text-transform:uppercase;}

.toprow{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;}
.mpanel{background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--rad);padding:11px 13px;flex-shrink:0;}
.plbl{font-size:9px;font-weight:500;color:var(--tx2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;}
.mi{display:flex;align-items:center;gap:5px;}
.bk{font-size:30px;font-weight:300;color:var(--tx3);line-height:1;user-select:none;}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.mg input{
  width:54px;background:var(--bg3);border:0.5px solid var(--br2);border-radius:var(--rsm);
  padding:5px 6px;font-family:var(--mono);font-size:13px;font-weight:500;color:var(--tx);
  text-align:center;outline:none;-moz-appearance:textfield;transition:border-color .15s;
}
.mg input::-webkit-outer-spin-button,.mg input::-webkit-inner-spin-button{-webkit-appearance:none;}
.mg input:focus{border-color:var(--o);}

.stats{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.stat{background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--rad);padding:7px 11px;min-width:68px;}
.slbl{font-size:9px;font-weight:500;color:var(--tx2);letter-spacing:.04em;margin-bottom:3px;}
.sv{font-size:14px;font-weight:500;color:var(--tx);}
.sv.o{color:var(--o);}.sv.p{color:var(--p);}.sv.r{color:var(--r);font-size:11px;}

/* step strip */
.sstrip{display:flex;background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--rad);overflow:hidden;}
.spb{
  flex:1;font-family:var(--mono);font-size:7px;font-weight:500;letter-spacing:.03em;
  text-transform:uppercase;padding:6px 1px;background:transparent;border:none;
  border-right:0.5px solid var(--br);color:var(--tx3);cursor:pointer;
  transition:background .15s,color .15s;text-align:center;line-height:1.5;
}
.spb:last-child{border-right:none;}
.spb.active{background:var(--bg3);color:var(--tx);}

canvas{width:100%;display:block;border-radius:var(--rad);border:0.5px solid var(--br);background:var(--bg2);}

/* annotation */
.ann{
  background:var(--bg2);border:0.5px solid var(--br2);border-radius:var(--rad);
  padding:10px 14px;font-size:11px;color:var(--tx2);line-height:1.65;min-height:38px;
}
.ann strong{color:var(--tx);}
.ann .o{color:var(--o);}.ann .p{color:var(--p);}.ann .g{color:var(--g);}

/* controls */
.ctrl-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:0.5px solid var(--br);border-radius:var(--rad);padding:9px 13px;}
.ctrl-mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.ctrl-lbl{font-size:9px;font-weight:500;color:var(--tx2);letter-spacing:.06em;text-transform:uppercase;user-select:none;}
.dots{display:flex;gap:4px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--br2);transition:background .2s,transform .2s;}
.dot.active{background:var(--tx2);transform:scale(1.3);}
.dot.done{background:var(--g);}
.nbtn{
  font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  background:var(--bg2);border:0.5px solid var(--br2);border-radius:var(--rsm);
  padding:7px 15px;color:var(--tx2);cursor:pointer;
  transition:background .12s,color .12s,opacity .15s;white-space:nowrap;min-width:80px;text-align:center;
}
.nbtn:hover:not(:disabled){background:var(--bg3);color:var(--tx);}
.nbtn:disabled{opacity:0.25;cursor:default;}
.nbtn.hi{background:var(--bg3);color:var(--tx);border-color:rgba(255,255,255,0.2);}
.nbtn.going{color:var(--o);border-color:rgba(246,173,85,0.35);}

.brow{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.btn{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;background:var(--bg2);border:0.5px solid var(--br2);border-radius:var(--rsm);padding:5px 11px;color:var(--tx2);cursor:pointer;transition:background .12s,color .12s;white-space:nowrap;}
.btn:hover{background:var(--bg3);color:var(--tx);}
.sep{flex:1;}
.prelbl{font-size:9px;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase;user-select:none;}

.legend{display:flex;gap:11px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--tx2);}
.ld{width:16px;height:3px;border-radius:2px;flex-shrink:0;}
</style>
</head>
<body>
<h1>Eigendecomposition  ·  X = P D P⁻¹</h1>

<div class="toprow">
  <div class="mpanel">
    <div class="plbl">Matrix X</div>
    <div class="mi">
      <div class="bk">[</div>
      <div class="mg">
        <input id="m00" type="number" value="2" step="0.5">
        <input id="m01" type="number" value="1" step="0.5">
        <input id="m10" type="number" value="1" step="0.5">
        <input id="m11" type="number" value="2" step="0.5">
      </div>
      <div class="bk">]</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="slbl">λ₁</div><div class="sv o" id="s1">3.00</div></div>
    <div class="stat"><div class="slbl">λ₂</div><div class="sv p" id="s2">1.00</div></div>
    <div class="stat"><div class="slbl">tr</div><div class="sv" id="str">4.00</div></div>
    <div class="stat"><div class="slbl">det</div><div class="sv" id="sdt">3.00</div></div>
    <div class="stat"><div class="slbl">v₁</div><div class="sv" style="font-size:10px" id="sv1">[.71,.71]</div></div>
    <div class="stat"><div class="slbl">v₂</div><div class="sv" style="font-size:10px" id="sv2">[−.71,.71]</div></div>
  </div>
</div>

<div class="sstrip" id="sstrip">
  <button class="spb active" onclick="jmp(0)">I · Setup</button>
  <button class="spb" onclick="jmp(1)">II · Apply X</button>
  <button class="spb" onclick="jmp(2)">III · Eigenvecs</button>
  <button class="spb" onclick="jmp(3)">IV · X again</button>
  <button class="spb" onclick="jmp(4)">Va · Redraw v</button>
  <button class="spb" onclick="jmp(5)">Vb · Eigenbasis</button>
  <button class="spb" onclick="jmp(6)">VI · D</button>
  <button class="spb" onclick="jmp(7)">VII · P</button>
</div>

<canvas id="cv"></canvas>
<div class="ann" id="ann"></div>

<div class="ctrl-row">
  <button class="nbtn" id="bprev" disabled>← Back</button>
  <div class="ctrl-mid">
    <span class="ctrl-lbl" id="slbl">Step 1 of 7</span>
    <div class="dots" id="dotrow">
      <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div>
    </div>
  </div>
  <button class="nbtn hi" id="bnext">Start ▶</button>
</div>

<div class="brow">
  <button class="btn" id="breset">↺ Reset</button>
  <div class="sep"></div>
  <span class="prelbl">Presets:</span>
  <button class="btn" onclick="setM(2,1,1,2)">Symmetric</button>
  <button class="btn" onclick="setM(3,0,0,1)">Diagonal</button>
  <button class="btn" onclick="setM(2,1,0,3)">Upper Tri</button>
  <button class="btn" onclick="setM(1,2,2,1)">Neg λ</button>
  <button class="btn" onclick="setM(1,1,0,1)">Defective</button>
  <button class="btn" onclick="setM(0,-1,1,0)">Rotation</button>
</div>

<div class="legend">
  <div class="li"><div class="ld" style="background:var(--g)"></div>v — arbitrary vector</div>
  <div class="li"><div class="ld" style="background:var(--o)"></div>v₁ eigenvector (λ₁)</div>
  <div class="li"><div class="ld" style="background:var(--p)"></div>v₂ eigenvector (λ₂)</div>
  <div class="li"><div class="ld" style="background:rgba(160,172,205,0.7)"></div>Standard basis e₁,e₂</div>
</div>

<script>
/* ── state ── */
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
const DPR = window.devicePixelRatio || 1;
let A = [[2,1],[1,2]];
let step=0, loc=0, anim=false, done=false, raf=null, ts0=null;

const N = 8;
/* seconds per step — generous pauses built in */
const DUR = [2.0, 2.6, 2.4, 2.8, 2.0, 2.4, 2.4, 2.8];

/* The one arbitrary vector we track throughout */
const V = [1.3, 0.5];

/* ── math ── */
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const ease=t=>{t=clamp(t,0,1);return t<0.5?2*t*t:(4-2*t)*t-1;};
const easeIn=t=>{t=clamp(t,0,1);return t*t*t;};
const easeOut=t=>{t=clamp(t,0,1);return 1-(1-t)**3;};
const mv=(M,v)=>[M[0][0]*v[0]+M[0][1]*v[1], M[1][0]*v[0]+M[1][1]*v[1]];
const vdot=(a,b)=>a[0]*b[0]+a[1]*b[1];
const vscale=(v,s)=>[v[0]*s,v[1]*s];
const vadd=(a,b)=>[a[0]+b[0],a[1]+b[1]];
const vlen=v=>Math.sqrt(v[0]*v[0]+v[1]*v[1]);
const vnorm=v=>{const l=vlen(v);return l<1e-9?[1,0]:[v[0]/l,v[1]/l];};

/* interpolate between two hex colours — returns css rgb() string */
function lerpCol(hex1,hex2,t){
  const h=h=>parseInt(h,16);
  const r1=h(hex1.slice(1,3)),g1=h(hex1.slice(3,5)),b1=h(hex1.slice(5,7));
  const r2=h(hex2.slice(1,3)),g2=h(hex2.slice(3,5)),b2=h(hex2.slice(5,7));
  const r=Math.round(lerp(r1,r2,t)),g=Math.round(lerp(g1,g2,t)),b=Math.round(lerp(b1,b2,t));
  return `rgb(${r},${g},${b})`;
}
/* basis colour for a given theme — grey in hex */
function basisHex(){return isDark()?'#6a7499':'#3e4a6e';}
const vlerpV=(a,b,t)=>[lerp(a[0],b[0],t),lerp(a[1],b[1],t)];

function getA(){
  return[
    [parseFloat(document.getElementById('m00').value)||0, parseFloat(document.getElementById('m01').value)||0],
    [parseFloat(document.getElementById('m10').value)||0, parseFloat(document.getElementById('m11').value)||0]
  ];
}
function setM(a,b,c,d){
  ['m00','m01','m10','m11'].forEach((id,i)=>document.getElementById(id).value=[a,b,c,d][i]);
  A=[[a,b],[c,d]]; resetAll(); updStats();
}

function eigOf(M){
  const tr=M[0][0]+M[1][1], det=M[0][0]*M[1][1]-M[0][1]*M[1][0];
  const disc=tr*tr-4*det;
  if(disc<-1e-9) return {type:'complex'};
  const sq=Math.sqrt(Math.max(disc,0)), l1=(tr+sq)/2, l2=(tr-sq)/2;
  function ev(lam){
    let vx,vy;
    if(Math.abs(M[0][1])>1e-9){vx=M[0][1];vy=lam-M[0][0];}
    else if(Math.abs(M[1][0])>1e-9){vx=lam-M[1][1];vy=M[1][0];}
    else{vx=1;vy=0;}
    const ln=vlen([vx,vy]); return ln<1e-9?null:[vx/ln,vy/ln];
  }
  const v1=ev(l1), v2=ev(l2);
  if(Math.abs(disc)<1e-9){
    const par=!v1||!v2||Math.abs(v1[0]*v2[1]-v1[1]*v2[0])<1e-6;
    if(par) return {type:'defective',l1,l2:l1,v1:v1||[1,0],v2:null};
  }
  return {type:'ok',l1,l2,v1,v2};
}

/* ── colour palette ── */
function isDark(){return window.matchMedia('(prefers-color-scheme:dark)').matches;}
function pal(){
  const d=isDark();
  return {
    gridMin: d?'rgba(255,255,255,0.035)':'rgba(0,0,0,0.035)',
    gridMaj: d?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.08)',
    gridXMin:d?'rgba(74,144,217,0.09)':'rgba(37,99,235,0.07)',
    gridXMaj:d?'rgba(74,144,217,0.20)':'rgba(37,99,235,0.16)',
    gridEMin:d?'rgba(246,173,85,0.09)':'rgba(217,119,6,0.07)',
    gridEMaj:d?'rgba(246,173,85,0.22)':'rgba(217,119,6,0.18)',
    axis:    d?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.12)',
    basis:   d?'rgba(160,172,210,0.70)':'rgba(65,78,120,0.65)',  /* grey basis arrows */
    orig:    d?'rgba(255,255,255,0.35)':'rgba(0,0,0,0.35)',
    lam1:    d?'#F6AD55':'#D97706',
    lam2:    d?'#C084FC':'#9333EA',
    grn:     d?'#48BB78':'#16A34A',
    sp1:     d?'rgba(246,173,85,0.55)':'rgba(217,119,6,0.55)',
    sp2:     d?'rgba(192,132,252,0.55)':'rgba(147,51,234,0.55)',
    lbl:     d?'rgba(255,255,255,0.60)':'rgba(0,0,0,0.60)',
  };
}

/* ── primitives ── */
let OX,OY,SC,GR;
const ts=v=>[OX+v[0]*SC, OY-v[1]*SC];

function drawGrid(alpha,bx,by,cm,cM){
  if(alpha<0.01) return;
  cx.globalAlpha=alpha;
  for(let i=-GR;i<=GR;i++){
    const maj=i%5===0;
    cx.strokeStyle=maj?cM:cm; cx.lineWidth=maj?.75:.45; cx.setLineDash([]);
    let[x0,y0]=ts([bx[0]*i-by[0]*GR, bx[1]*i-by[1]*GR]);
    let[x1,y1]=ts([bx[0]*i+by[0]*GR, bx[1]*i+by[1]*GR]);
    cx.beginPath();cx.moveTo(x0,y0);cx.lineTo(x1,y1);cx.stroke();
    [x0,y0]=ts([by[0]*i-bx[0]*GR, by[1]*i-bx[1]*GR]);
    [x1,y1]=ts([by[0]*i+bx[0]*GR, by[1]*i+bx[1]*GR]);
    cx.beginPath();cx.moveTo(x0,y0);cx.lineTo(x1,y1);cx.stroke();
  }
  cx.globalAlpha=1;
}
const stdGrid=(a,p)=>drawGrid(a,[1,0],[0,1],p.gridMin,p.gridMaj);

function drawAxes(alpha,p){
  if(alpha<0.01) return;
  cx.globalAlpha=alpha; cx.strokeStyle=p.axis; cx.lineWidth=1; cx.setLineDash([]);
  let[x0,y0]=ts([-GR,0]),[x1,y1]=ts([GR,0]);
  cx.beginPath();cx.moveTo(x0,y0);cx.lineTo(x1,y1);cx.stroke();
  [x0,y0]=ts([0,-GR]);[x1,y1]=ts([0,GR]);
  cx.beginPath();cx.moveTo(x0,y0);cx.lineTo(x1,y1);cx.stroke();
  cx.globalAlpha=1;
}

function arrow(from,to,color,w,alpha,dash){
  if(alpha<0.01) return;
  const[x1,y1]=ts(from),[x2,y2]=ts(to);
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<2) return;
  const ux=dx/len,uy=dy/len,hw=Math.max(w*3.2,5),hl=Math.max(w*4.5,8);
  const tx=x2-ux*hl,ty=y2-uy*hl;
  cx.globalAlpha=alpha; cx.strokeStyle=color; cx.lineWidth=w; cx.lineCap='round';
  cx.setLineDash(dash||[]);
  cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(tx,ty);cx.stroke();
  cx.setLineDash([]);
  cx.fillStyle=color;
  cx.beginPath();cx.moveTo(x2,y2);
  cx.lineTo(tx-uy*hw,ty+ux*hw);cx.lineTo(tx+uy*hw,ty-ux*hw);
  cx.closePath();cx.fill();
  cx.globalAlpha=1;
}

function eigspan(dir,color,alpha){
  if(alpha<0.01) return;
  cx.globalAlpha=alpha; cx.strokeStyle=color; cx.lineWidth=1.2; cx.setLineDash([6,5]);
  const[sx0,sy0]=ts([-dir[0]*GR,-dir[1]*GR]),[sx1,sy1]=ts([dir[0]*GR,dir[1]*GR]);
  cx.beginPath();cx.moveTo(sx0,sy0);cx.lineTo(sx1,sy1);cx.stroke();
  cx.setLineDash([]); cx.globalAlpha=1;
}

function label(vec,text,color,alpha,ox,oy){
  if(alpha<0.01) return;
  const[sx,sy]=ts(vec);
  cx.globalAlpha=alpha; cx.fillStyle=color;
  cx.font='500 10px JetBrains Mono,monospace';
  cx.textAlign='left'; cx.textBaseline='middle';
  cx.fillText(text, sx+(ox||10), sy+(oy||0));
  cx.globalAlpha=1;
}

function centreLabel(text,alpha,yOff){
  if(alpha<0.01) return;
  const[sx,sy]=ts([0, yOff!==undefined?yOff:-1.65]);
  cx.globalAlpha=alpha*.85; cx.fillStyle=pal().lbl;
  cx.font='400 9px JetBrains Mono,monospace';
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillText(text,sx,sy);
  cx.globalAlpha=1;
}

function dot(v,r,color,alpha){
  if(alpha<0.01) return;
  const[sx,sy]=ts(v);
  cx.globalAlpha=alpha; cx.fillStyle=color;
  cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);cx.fill();
  cx.globalAlpha=1;
}

/* draw standard basis arrows in grey */
function basisArrows(alpha,p){
  arrow([0,0],[1,0],p.basis,1.8,alpha);
  arrow([0,0],[0,1],p.basis,1.8,alpha);
  label([1,0],'e₁',p.basis,alpha*.75);
  label([0,1],'e₂',p.basis,alpha*.75);
}

/* ── DRAW ── */
function draw(){
  A=getA();
  const eig=eigOf(A);
  const p=pal();
  const W=cv.width/DPR, H=cv.height/DPR;
  cx.clearRect(0,0,cv.width,cv.height);
  cx.save(); cx.scale(DPR,DPR);
  OX=W/2; OY=H/2; SC=Math.min(W,H)*.148; GR=Math.ceil(Math.max(W,H)/SC)+2;

  updAnn(step,loc,eig);

  /* non-diagonalisable fallback */
  if(eig.type!=='ok'){
    stdGrid(1,p); drawAxes(1,p);
    if(eig.type==='defective'&&eig.v1){
      const fa=ease(clamp(loc/.5,0,1));
      eigspan(eig.v1,p.sp1,fa*.8);
      arrow([0,0],eig.v1,p.lam1,2.5,fa);
      label(eig.v1,'v₁  (λ='+eig.l1.toFixed(2)+', only eigenvector)',p.lam1,fa);
    }
    dot([0,0],3,p.orig,1); cx.restore(); return;
  }

  const Av=mv(A,V);
  const Ae1=mv(A,[1,0]), Ae2=mv(A,[0,1]);
  const e=ease(loc);

  /* ══════════════════════════════════════════════
     STEP 0 · Setup
     Show the standard grid, basis arrows, and
     introduce the green arbitrary vector.
  ══════════════════════════════════════════════ */
  if(step===0){
    stdGrid(1,p); drawAxes(1,p);
    basisArrows(ease(clamp(loc/.45,0,1)), p);
    const ga=ease(clamp((loc-.35)/.5,0,1));
    arrow([0,0],V,p.grn,2.4,ga);
    label(V,'v',p.grn,ga);
    centreLabel('v is an arbitrary vector — not an eigenvector', ease(clamp((loc-.72)/.24,0,1)));
  }

  /* ══════════════════════════════════════════════
     STEP 1 · Apply X
     The grid, basis vectors, and v all transform.
     Pause at end so the viewer can absorb the result.
     Key message: v changes direction — it was rotated.
  ══════════════════════════════════════════════ */
  else if(step===1){
    /* grid transforms for first 70% of the step, then holds */
    const tProg=ease(clamp(loc/.7,0,1));
    const cbx=vlerpV([1,0],Ae1,tProg), cby=vlerpV([0,1],Ae2,tProg);
    drawGrid(1,cbx,cby,p.gridXMin,p.gridXMaj);
    drawAxes(1-tProg*.85, p);

    /* basis arrows transform */
    const b1=vlerpV([1,0],Ae1,tProg), b2=vlerpV([0,1],Ae2,tProg);
    arrow([0,0],b1,p.basis,1.8,1);
    arrow([0,0],b2,p.basis,1.8,1);
    label(b1,loc>.6?'Xe₁':'e₁',p.basis,.75);
    label(b2,loc>.6?'Xe₂':'e₂',p.basis,.75);

    /* v transforms to Xv */
    const gv=vlerpV(V,Av,tProg);
    arrow([0,0],gv,p.grn,2.4,1);
    label(gv,loc>.6?'Xv':'v→Xv',p.grn,1);

    /* pause message fades in once transform is done */
    const pfa=ease(clamp((loc-.75)/.22,0,1));
    centreLabel('X rotates and scales v — it points in a new direction',pfa);
  }

  /* ══════════════════════════════════════════════
     STEP 2 · Eigenvectors
     Reset to standard basis. Then reveal the
     eigenvector spans, and show that they are the
     directions X leaves invariant.
     The green v is gone — focus is on eigenvectors.
  ══════════════════════════════════════════════ */
  else if(step===2){
    /* first third: grid/basis reset from Xe back to I */
    const resetP=ease(clamp(loc/.32,0,1));
    const cbx=vlerpV(Ae1,[1,0],resetP), cby=vlerpV(Ae2,[0,1],resetP);
    drawGrid(1,cbx,cby,p.gridXMin,p.gridXMaj);
    stdGrid(resetP,p); drawAxes(resetP,p);
    basisArrows(lerp(.85,.28,ease(clamp((loc-.3)/.4,0,1))), p);

    /* eigenvector spans fade in after reset */
    const spFa=ease(clamp((loc-.32)/.38,0,1));
    eigspan(eig.v1,p.sp1,spFa*.9);
    eigspan(eig.v2,p.sp2,spFa*.9);

    /* eigenvector arrows appear */
    const vFa=ease(clamp((loc-.55)/.38,0,1));
    arrow([0,0],eig.v1,p.lam1,2.6,vFa);
    arrow([0,0],eig.v2,p.lam2,2.6,vFa);
    label(eig.v1,'v₁  λ₁='+eig.l1.toFixed(2),p.lam1,vFa);
    label(eig.v2,'v₂  λ₂='+eig.l2.toFixed(2),p.lam2,vFa);

    centreLabel('Xvᵢ = λᵢvᵢ — these directions are only scaled, never rotated', ease(clamp((loc-.78)/.20,0,1)));
  }

  /* ══════════════════════════════════════════════
     STEP 3 · Apply X with eigenvectors shown
     Now apply X again. The eigenvector spans stay
     fixed while everything else rotates. The green v
     comes back so we can see it rotate while the
     eigenvectors just scale.
  ══════════════════════════════════════════════ */
  else if(step===3){
    const tProg=ease(clamp(loc/.65,0,1));
    const cbx=vlerpV([1,0],Ae1,tProg), cby=vlerpV([0,1],Ae2,tProg);
    drawGrid(1,cbx,cby,p.gridXMin,p.gridXMaj);

    /* basis arrows transform (grey) */
    const b1=vlerpV([1,0],Ae1,tProg), b2=vlerpV([0,1],Ae2,tProg);
    arrow([0,0],b1,p.basis,1.8,1);
    arrow([0,0],b2,p.basis,1.8,1);

    /* eigenvector spans — completely pinned */
    eigspan(eig.v1,p.sp1,.88); eigspan(eig.v2,p.sp2,.88);

    /* eigenvectors grow along their spans */
    const sv1=vscale(eig.v1,lerp(1,eig.l1,tProg));
    const sv2=vscale(eig.v2,lerp(1,eig.l2,tProg));
    arrow([0,0],sv1,p.lam1,2.6,1);
    arrow([0,0],sv2,p.lam2,2.6,1);
    label(sv1,loc>.5?'λ₁v₁':'v₁',p.lam1,1);
    label(sv2,loc>.5?'λ₂v₂':'v₂',p.lam2,1);

    const pfa=ease(clamp((loc-.72)/.24,0,1));
    centreLabel('Eigenvector spans invariant — everything else rotates, eigenvectors only scale',pfa);
  }

  /* ══════════════════════════════════════════════
     STEP 4 · Va — Redraw v
     After showing eigenvectors in isolation (step III),
     we reset to standard grid + eigenvec spans, then
     slowly reintroduce the green vector v so the viewer
     can see it sitting in relation to the eigenspans
     before we start the decomposition.
  ══════════════════════════════════════════════ */
  else if(step===4){
    stdGrid(1,p); drawAxes(1,p);
    /* grey basis very dim — just a reference */
    basisArrows(.2,p);
    /* eigenvec spans always present */
    eigspan(eig.v1,p.sp1,.8); eigspan(eig.v2,p.sp2,.8);
    /* eigenvec unit arrows at low opacity — just orientation */
    arrow([0,0],eig.v1,p.lam1,2.0,.45);
    arrow([0,0],eig.v2,p.lam2,2.0,.45);
    label(eig.v1,'v₁',p.lam1,.45);
    label(eig.v2,'v₂',p.lam2,.45);
    /* green v fades in slowly */
    const gFa=ease(clamp((loc-.18)/.6,0,1));
    arrow([0,0],V,p.grn,2.4,gFa);
    label(V,'v',p.grn,gFa);
    centreLabel("v sits between the two eigenspans — it's not an eigenvector",ease(clamp((loc-.72)/.24,0,1)));
  }

  /* ══════════════════════════════════════════════
     STEP 5 · Vb — Change to eigenbasis (P⁻¹)
     The grey basis arrows rotate AND colour-shift:
     e₁ (grey) → v₁ (orange), e₂ (grey) → v₂ (purple).
     The grid deforms with them. No separate coloured
     arrows appear — the grey ones BECOME the coloured
     ones. Spans stay as fixed directional guides.
     Once settled, v's components appear.
  ══════════════════════════════════════════════ */
  else if(step===5){
    const tProg=ease(clamp(loc/.65,0,1));

    /* normalised direction: rotates from e→v at unit length */
    const bx=vnorm(vlerpV([1,0],eig.v1,tProg));
    const by=vnorm(vlerpV([0,1],eig.v2,tProg));

    /* grid follows the rotation */
    drawGrid(1,bx,by,p.gridEMin,p.gridEMaj);

    /* eigenvec spans — fixed directional guides */
    eigspan(eig.v1,p.sp1,.75); eigspan(eig.v2,p.sp2,.75);

    /* colour-shift: grey → lam1/lam2 as arrows rotate into eigenvectors */
    const lam1Hex=isDark()?'#F6AD55':'#D97706';
    const lam2Hex=isDark()?'#C084FC':'#9333EA';
    const col1=lerpCol(basisHex(),lam1Hex,tProg);
    const col2=lerpCol(basisHex(),lam2Hex,tProg);
    arrow([0,0],bx,col1,2.2,1);
    arrow([0,0],by,col2,2.2,1);
    label(bx,tProg>.6?'v₁':'e₁',col1,.9);
    label(by,tProg>.6?'v₂':'e₂',col2,.9);

    /* green v stays fixed spatially */
    arrow([0,0],V,p.grn,2.4,1);
    label(V,'v',p.grn,1);

    /* component projections fade in once frame settled */
    const compFa=ease(clamp((loc-.70)/.27,0,1));
    if(compFa>0.01){
      const c1=vdot(V,eig.v1), c2=vdot(V,eig.v2);
      const pr1=vscale(eig.v1,c1), pr2=vscale(eig.v2,c2);
      arrow([0,0],pr1,p.lam1,1.4,compFa*.85,[3,3]);
      arrow([0,0],pr2,p.lam2,1.4,compFa*.85,[3,3]);
      label(vscale(pr1,.5),'c₁v₁',p.lam1,compFa*.8,0,-11);
      label(vscale(pr2,.5),'c₂v₂',p.lam2,compFa*.8,0,11);
    }

    centreLabel('P⁻¹: basis rotates into eigenvectors — v = c₁v₁ + c₂v₂',ease(clamp((loc-.44)/.28,0,1)));
  }

  /* ══════════════════════════════════════════════
     STEP 6 · D — apply X in the eigenbasis
     In the eigenbasis, X is diagonal: each component
     scales by its λ independently. No rotation.
     Only show the component arrows scaling — no
     separate eigenvec basis arrows to avoid confusion.
  ══════════════════════════════════════════════ */
  else if(step===6){
    const c1=vdot(V,eig.v1), c2=vdot(V,eig.v2);
    const sc1=lerp(c1,c1*eig.l1,e), sc2=lerp(c2,c2*eig.l2,e);

    /* eigenbasis grid scales */
    const s1=lerp(1,eig.l1,e), s2=lerp(1,eig.l2,e);
    drawGrid(1,vscale(eig.v1,s1),vscale(eig.v2,s2),p.gridEMin,p.gridEMaj);
    eigspan(eig.v1,p.sp1,.65); eigspan(eig.v2,p.sp2,.65);

    /* only the component arrows — these ARE the eigenvec axes in this frame */
    const p1s=vscale(eig.v1,sc1), p2s=vscale(eig.v2,sc2);
    arrow([0,0],p1s,p.lam1,1.8,1);
    arrow([0,0],p2s,p.lam2,1.8,1);
    label(p1s,loc>.45?'λ₁c₁v₁':'c₁v₁',p.lam1,1);
    label(p2s,loc>.45?'λ₂c₂v₂':'c₂v₂',p.lam2,1);

    /* green v = sum of scaled components */
    const newV=vadd(p1s,p2s);
    arrow([0,0],newV,p.grn,2.4,1);
    label(newV,loc>.45?'Dv':'v',p.grn,1);

    centreLabel('D: c₁v₁ → λ₁c₁v₁  and  c₂v₂ → λ₂c₂v₂ — no rotation',ease(clamp((loc-.5)/.35,0,1)));
  }

  /* ══════════════════════════════════════════════
     STEP 7 · P — rotate back to standard coordinates
     Exact reverse of Vb: the coloured v₁/v₂ arrows
     (scaled by λ) rotate back toward Xe₁/Xe₂ and
     simultaneously colour-shift from orange/purple
     back to grey. Grid deforms with them.
     Green v lands exactly on Xv.
  ══════════════════════════════════════════════ */
  else if(step===7){
    const c1=vdot(V,eig.v1)*eig.l1, c2=vdot(V,eig.v2)*eig.l2;
    const scaledV=vadd(vscale(eig.v1,c1),vscale(eig.v2,c2));

    /* basis arrows: start at scaled eigenvectors, rotate to Xe1/Xe2.
       We keep them at their actual scaled lengths (not normalised) so
       the viewer sees the scaling that D applied. */
    const startBx=vscale(eig.v1,eig.l1), startBy=vscale(eig.v2,eig.l2);
    const cbx=vlerpV(startBx,Ae1,e), cby=vlerpV(startBy,Ae2,e);

    /* grid follows */
    drawGrid(1,cbx,cby,p.gridXMin,p.gridXMaj);

    /* eigenvec spans fade out as we leave the eigenbasis */
    eigspan(eig.v1,p.sp1,(1-e)*.7); eigspan(eig.v2,p.sp2,(1-e)*.7);

    /* colour-shift: lam1/lam2 → grey as arrows rotate back */
    const lam1Hex=isDark()?'#F6AD55':'#D97706';
    const lam2Hex=isDark()?'#C084FC':'#9333EA';
    const col1=lerpCol(lam1Hex,basisHex(),e);
    const col2=lerpCol(lam2Hex,basisHex(),e);
    arrow([0,0],cbx,col1,2.2,1);
    arrow([0,0],cby,col2,2.2,1);
    label(cbx,loc>.55?'Xe₁':'λ₁v₁→',col1,.9);
    label(cby,loc>.55?'Xe₂':'λ₂v₂→',col2,.9);

    /* green v moves from scaledV to Xv */
    const gv=vlerpV(scaledV,Av,e);
    arrow([0,0],gv,p.grn,2.4,1);
    label(gv,loc>.55?'Xv = P·D·P⁻¹·v  ✓':'Dv →',p.grn,1);

    if(loc>.62){
      const fa=ease(clamp((loc-.62)/.3,0,1));
      centreLabel('P·D·P⁻¹·v = Xv ✓   Still scaled — X⁻¹ = P·D⁻¹·P⁻¹ recovers v',fa);
    }
  }

  dot([0,0],3,p.orig,1);
  cx.restore();
}

/* ── annotations ── */
const ANNS = [
  ()=>`<strong>I · Setup.</strong> The standard basis e₁=[1,0] and e₂=[0,1] define the coordinate frame. The <span class="g">green vector v</span> is an arbitrary vector — we will track it through the decomposition as a concrete example.`,

  ()=>`<strong>II · Applying X.</strong> X transforms every vector by rotation and scaling. The grey basis and <span class="g">green v</span> all move. For a generic vector, Xv points in a completely new direction — X does not preserve the direction of arbitrary vectors.`,

  (l,eig)=>`<strong>III · Eigenvectors.</strong> The eigenvectors <span class="o">v₁</span> and <span class="p">v₂</span> satisfy Xvᵢ = λᵢvᵢ — their spans are the only directions X leaves invariant. Any vector on these lines is only scaled, never rotated. <span class="o">λ₁ = ${eig.l1.toFixed(3)}</span>, <span class="p">λ₂ = ${eig.l2.toFixed(3)}</span>.`,

  ()=>`<strong>IV · X again — with eigenvectors shown.</strong> The whole space transforms. The eigenvector spans stay completely fixed — they only grow (scaled by λ). All other directions rotate. This is the geometric meaning of Xvᵢ = λᵢvᵢ.`,

  ()=>`<strong>Va · Re-introduce v.</strong> Back in the standard frame with eigenvector spans visible. The <span class="g">green v</span> sits between the two eigenspans — it is not an eigenvector, so X will rotate it. We will now decompose what X does to v into three steps: P⁻¹, then D, then P.`,

  ()=>`<strong>Vb · P⁻¹ — change of basis.</strong> P = [v₁ | v₂]. Multiplying by P⁻¹ rotates the coordinate frame so that v₁ and v₂ become the new axes. The grey basis vectors morph into the eigenvector directions. The <span class="g">green v</span> stays fixed in space — but can now be read as c₁v₁ + c₂v₂, its two eigenvector components.`,

  (l,eig)=>`<strong>VI · D — X in the eigenbasis.</strong> In eigenbasis coordinates, multiplying by X <em>is</em> multiplying by D = diag(λ₁, λ₂). Each component scales independently: c₁v₁ → <span class="o">λ₁</span>c₁v₁ and c₂v₂ → <span class="p">λ₂</span>c₂v₂. No rotation. D is not a different matrix — it is X seen from its natural coordinate frame.`,

  ()=>`<strong>VII · P — back to standard coordinates.</strong> P maps from the eigenbasis back to standard. The <span class="g">green vector</span> lands exactly on Xv — confirming P·D·P⁻¹·v = Xv. The result is still scaled (that is what X does). X⁻¹ = P·D⁻¹·P⁻¹ would recover v.`,
];

function updAnn(s,l,eig){
  const el=document.getElementById('ann');
  if(eig.type==='complex'){
    el.innerHTML='<strong>Complex eigenvalues:</strong> tr²−4det < 0 — this matrix is a rotation-scaling with no real invariant direction. P·D·P⁻¹ is not possible over ℝ.';return;
  }
  if(eig.type==='defective'){
    el.innerHTML='<strong>Defective matrix:</strong> λ = <span class="o">'+eig.l1.toFixed(2)+'</span> has algebraic multiplicity 2 but only one independent eigenvector. P is not invertible — use Jordan decomposition instead.';return;
  }
  el.innerHTML=ANNS[s](l,eig);
}

/* ── stats ── */
function updStats(){
  A=getA(); const eig=eigOf(A);
  const tr=A[0][0]+A[1][1], det=A[0][0]*A[1][1]-A[0][1]*A[1][0];
  document.getElementById('str').textContent=tr.toFixed(2);
  document.getElementById('sdt').textContent=det.toFixed(2);
  const e1=document.getElementById('s1'),e2=document.getElementById('s2');
  const f1=document.getElementById('sv1'),f2=document.getElementById('sv2');
  if(eig.type==='complex'){
    e1.textContent='cmplx';e1.className='sv r';e2.textContent='cmplx';e2.className='sv r';
    f1.textContent='—';f2.textContent='—';
  } else if(eig.type==='defective'){
    e1.textContent=eig.l1.toFixed(2);e1.className='sv o';
    e2.textContent=eig.l2.toFixed(2)+' ×2';e2.className='sv p';
    f1.textContent=eig.v1?'['+eig.v1[0].toFixed(2)+','+eig.v1[1].toFixed(2)+']':'—';
    f2.textContent='—';
  } else {
    e1.textContent=eig.l1.toFixed(2);e1.className='sv o';
    e2.textContent=eig.l2.toFixed(2);e2.className='sv p';
    f1.textContent=eig.v1?'['+eig.v1[0].toFixed(2)+','+eig.v1[1].toFixed(2)+']':'—';
    f2.textContent=eig.v2?'['+eig.v2[0].toFixed(2)+','+eig.v2[1].toFixed(2)+']':'—';
  }
}

/* ── UI ── */
function updUI(){
  const bp=document.getElementById('bprev'), bn=document.getElementById('bnext');
  document.getElementById('slbl').textContent='Step '+(step+1)+' of '+N;
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.remove('active','done');
    if(i<step) d.classList.add('done');
    if(i===step) d.classList.add('active');
  });
  document.querySelectorAll('.spb').forEach((b,i)=>b.classList.toggle('active',i===step));
  bp.disabled=(step===0);
  const eig=eigOf(getA());
  const blocked=eig.type!=='ok'&&step>=1;
  if(anim){
    bn.textContent='· · ·';bn.disabled=true;bn.classList.add('going');bn.classList.remove('hi');
  } else if(blocked){
    bn.textContent='N/A';bn.disabled=true;bn.classList.remove('going','hi');
  } else if(!done){
    bn.textContent=step===0?'Start ▶':'Play ▶';
    bn.disabled=false;bn.classList.add('hi');bn.classList.remove('going');
  } else if(step<N-1){
    bn.textContent='Next →';
    bn.disabled=false;bn.classList.add('hi');bn.classList.remove('going');
  } else {
    bn.textContent='Done ✓';bn.disabled=true;bn.classList.remove('hi','going');
  }
}

/* ── playback ── */
function startAnim(){
  if(anim) return;
  anim=true; done=false; ts0=null; updUI();
  raf=requestAnimationFrame(tick);
}
function tick(t){
  if(!anim) return;
  if(ts0===null) ts0=t;
  const dt=(t-ts0)/1e3; ts0=t;
  loc=Math.min(loc+dt/DUR[step],1);
  A=getA(); updStats(); draw();
  if(loc>=1){anim=false;done=true;updUI();return;}
  raf=requestAnimationFrame(tick);
}
function stopAnim(){anim=false;if(raf){cancelAnimationFrame(raf);raf=null;}}

function jmp(p){
  stopAnim(); step=Math.max(0,Math.min(N-1,p)); loc=0; done=false;
  A=getA(); updStats(); draw(); updUI();
}
function resetAll(){stopAnim();step=0;loc=0;done=false;A=getA();draw();updUI();}

document.getElementById('bnext').addEventListener('click',()=>{
  if(anim) return;
  if(!done){ startAnim(); }
  else if(step<N-1){ step++; loc=0; done=false; updUI(); startAnim(); }
});
document.getElementById('bprev').addEventListener('click',()=>{
  if(anim) stopAnim();
  if(step>0){step--;loc=1;done=true;}else{loc=0;done=false;}
  A=getA(); updStats(); draw(); updUI();
});
document.getElementById('breset').addEventListener('click',resetAll);
['m00','m01','m10','m11'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{A=getA();updStats();draw();updUI();});
});

function resize(){
  const w=cv.parentElement.clientWidth, h=Math.min(390,Math.round(w*.48));
  cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px'; draw();
}
window.addEventListener('resize',resize);
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>draw());
resize(); updStats(); updUI(); draw();
</script>
</body>
</html>
