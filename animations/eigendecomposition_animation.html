<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eigendecomposition Visualiser</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0f1117;--bg2:#171b26;--bg3:#1e2333;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
    --text:#e2e4ec;--text2:#8b90a0;--text3:#555a6a;
    --o:#F6AD55;--p:#C084FC;--b:#4A90D9;--g:#48BB78;--r:#FC8181;
    --mono:'JetBrains Mono',monospace;--radius:10px;--rsm:6px;
  }
  @media(prefers-color-scheme:light){:root{
    --bg:#f4f5f8;--bg2:#fff;--bg3:#eceef3;
    --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
    --text:#1a1d2e;--text2:#5a5f72;--text3:#a0a5b5;
    --o:#D97706;--p:#9333EA;--b:#2563EB;--g:#16A34A;--r:#DC2626;
  }}
  html,body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;}
  body{display:flex;flex-direction:column;padding:18px;gap:12px;min-height:100vh;}
  h1{font-size:14px;font-weight:500;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;}

  .top-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;}
  .matrix-panel{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;flex-shrink:0;}
  .panel-label{font-size:10px;font-weight:500;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
  .matrix-inner{display:flex;align-items:center;gap:6px;}
  .bracket{font-size:36px;font-weight:300;color:var(--text3);line-height:1;user-select:none;}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .mgrid input{
    width:64px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--rsm);
    padding:7px 8px;font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text);
    text-align:center;outline:none;transition:border-color .15s;-moz-appearance:textfield;
  }
  .mgrid input::-webkit-outer-spin-button,.mgrid input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .mgrid input:focus{border-color:var(--b);}

  .stats{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
  .stat{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;min-width:78px;}
  .stat-label{font-size:10px;font-weight:500;color:var(--text2);letter-spacing:.04em;margin-bottom:5px;}
  .sv{font-size:16px;font-weight:500;color:var(--text);transition:color .3s;}
  .sv.o{color:var(--o);}.sv.p{color:var(--p);}.sv.r{color:var(--r);font-size:12px;}

  .phase-strip{display:flex;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .pb{
    flex:1;font-family:var(--mono);font-size:8px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;
    padding:7px 2px;background:transparent;border:none;border-right:0.5px solid var(--border);
    color:var(--text3);cursor:pointer;transition:background .15s,color .15s;text-align:center;line-height:1.5;
  }
  .pb:last-child{border-right:none;}
  .pb.active{background:var(--bg3);color:var(--text);}

  canvas{width:100%;display:block;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg2);}

  .annotation{
    background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);
    padding:11px 15px;font-size:11px;color:var(--text2);line-height:1.65;min-height:42px;
  }
  .annotation strong{color:var(--text);}
  .annotation .o{color:var(--o);}.annotation .p{color:var(--p);}.annotation .b{color:var(--b);}

  .step-controls{display:flex;align-items:center;gap:12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 16px;}
  .step-info{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;}
  #step-label{font-size:10px;font-weight:500;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;user-select:none;}
  .dots{display:flex;gap:5px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border2);transition:background .2s,transform .2s;}
  .dot.active{background:var(--text2);transform:scale(1.3);}
  .dot.done{background:var(--g);}

  .sbtn{
    font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
    background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--rsm);
    padding:9px 18px;color:var(--text2);cursor:pointer;transition:background .12s,color .12s,opacity .12s;
    white-space:nowrap;min-width:90px;text-align:center;
  }
  .sbtn:hover:not(:disabled){background:var(--bg3);color:var(--text);}
  .sbtn:disabled{opacity:0.28;cursor:default;}
  .sbtn.primary{background:var(--bg3);color:var(--text);border-color:rgba(255,255,255,0.22);}
  .sbtn.anim{color:var(--o);border-color:rgba(246,173,85,0.4);}

  .btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .ctrl{
    font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
    background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--rsm);
    padding:7px 14px;color:var(--text2);cursor:pointer;transition:background .12s,color .12s;white-space:nowrap;
  }
  .ctrl:hover{background:var(--bg3);color:var(--text);}
  .sep{flex:1;}
  .plbl{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;user-select:none;}

  .legend{display:flex;gap:14px;flex-wrap:wrap;padding:0 2px;}
  .li{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text2);}
  .ld{width:22px;height:3px;border-radius:2px;flex-shrink:0;}
</style>
</head>
<body>
<h1>Eigendecomposition Visualiser</h1>

<div class="top-row">
  <div class="matrix-panel">
    <div class="panel-label">Matrix X</div>
    <div class="matrix-inner">
      <div class="bracket">[</div>
      <div class="mgrid">
        <input id="a00" type="number" value="2" step="0.5">
        <input id="a01" type="number" value="1" step="0.5">
        <input id="a10" type="number" value="1" step="0.5">
        <input id="a11" type="number" value="2" step="0.5">
      </div>
      <div class="bracket">]</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-label">λ₁</div><div class="sv o" id="st-l1">3.00</div></div>
    <div class="stat"><div class="stat-label">λ₂</div><div class="sv p" id="st-l2">1.00</div></div>
    <div class="stat"><div class="stat-label">tr(X)</div><div class="sv" id="st-tr">4.00</div></div>
    <div class="stat"><div class="stat-label">det(X)</div><div class="sv" id="st-det">3.00</div></div>
    <div class="stat"><div class="stat-label">v₁</div><div class="sv" style="font-size:11px" id="st-v1">[.71,.71]</div></div>
    <div class="stat"><div class="stat-label">v₂</div><div class="sv" style="font-size:11px" id="st-v2">[−.71,.71]</div></div>
  </div>
</div>

<div class="phase-strip">
  <button class="pb active" onclick="jumpTo(0)">1·Standard<br>basis</button>
  <button class="pb"        onclick="jumpTo(1)">2·Apply<br>X</button>
  <button class="pb"        onclick="jumpTo(2)">3·Apply<br>X⁻¹</button>
  <button class="pb"        onclick="jumpTo(3)">4·Eigen-<br>vectors</button>
  <button class="pb"        onclick="jumpTo(4)">5·Apply X<br>again</button>
  <button class="pb"        onclick="jumpTo(5)">6·Reset<br>to I</button>
  <button class="pb"        onclick="jumpTo(6)">7·P⁻¹<br>basis</button>
  <button class="pb"        onclick="jumpTo(7)">8·D=X in<br>eigenbasis</button>
  <button class="pb"        onclick="jumpTo(8)">9·P<br>back</button>
</div>

<canvas id="c"></canvas>

<div class="annotation" id="ann"></div>

<div class="step-controls">
  <button class="sbtn" id="btn-prev" disabled>← Prev</button>
  <div class="step-info">
    <span id="step-label">Step 1 / 7</span>
    <div class="dots" id="dots">
      <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
  <button class="sbtn primary" id="btn-next">Start ▶</button>
</div>

<div class="btn-row">
  <button class="ctrl" id="btn-reset">↺ Reset</button>
  <div class="sep"></div>
  <span class="plbl">Presets:</span>
  <button class="ctrl" onclick="setMat(2,1,1,2)">Symmetric</button>
  <button class="ctrl" onclick="setMat(3,0,0,1)">Diagonal</button>
  <button class="ctrl" onclick="setMat(2,1,0,3)">Upper Tri</button>
  <button class="ctrl" onclick="setMat(1,2,2,1)">Neg λ</button>
  <button class="ctrl" onclick="setMat(1,1,0,1)">Defective</button>
  <button class="ctrl" onclick="setMat(0,-1,1,0)">Rotation</button>
</div>

<div class="legend">
  <div class="li"><div class="ld" style="background:rgba(150,160,190,0.55)"></div>Standard basis I (grey ghost)</div>
  <div class="li"><div class="ld" style="background:var(--o)"></div>v₁ · eigenvector (λ₁)</div>
  <div class="li"><div class="ld" style="background:var(--p)"></div>v₂ · eigenvector (λ₂)</div>
  <div class="li"><div class="ld" style="background:var(--b)"></div>Transformed / decomposition</div>
</div>

<script>
/* ═══════════════ state ═══════════════ */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const DPR=window.devicePixelRatio||1;
let A=[[2,1],[1,2]];
let step=0, loc=0, animating=false, done=false, raf=null, lastTs=null;

const N=9;
/* Each step has one or more sub-phases with durations (seconds).
   stepPhases[s] = array of durations; loc runs 0→1 across ALL sub-phases in sequence. */
const DURS=[ [1.6], [2.0], [1.8], [2.2], [2.6], [1.8], [2.4], [2.2], [2.4] ];
/* flat total per step */
const TOTAL=DURS.map(d=>d.reduce((a,b)=>a+b,0));

/* within a step, given loc∈[0,1], return which sub-phase and local progress */
function subphase(s,l){
  const ds=DURS[s], tot=TOTAL[s];
  let acc=0;
  for(let i=0;i<ds.length;i++){
    const frac=ds[i]/tot;
    if(l<=acc+frac) return{sp:i, sl:clamp((l-acc)/frac,0,1)};
    acc+=frac;
  }
  return{sp:ds.length-1,sl:1};
}

/* ═══════════════ math ═══════════════ */
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function ease(t){t=clamp(t,0,1);return t<0.5?2*t*t:(4-2*t)*t-1;}
function eIn(t){t=clamp(t,0,1);return t*t;}
function matMul(M,v){return[M[0][0]*v[0]+M[0][1]*v[1],M[1][0]*v[0]+M[1][1]*v[1]];}

function getA(){
  return[
    [parseFloat(document.getElementById('a00').value)||0, parseFloat(document.getElementById('a01').value)||0],
    [parseFloat(document.getElementById('a10').value)||0, parseFloat(document.getElementById('a11').value)||0]
  ];
}
function setMat(a,b,c,d){
  document.getElementById('a00').value=a;document.getElementById('a01').value=b;
  document.getElementById('a10').value=c;document.getElementById('a11').value=d;
  A=[[a,b],[c,d]];resetAll();updateStats();
}

function eigenOf(M){
  const tr=M[0][0]+M[1][1], det=M[0][0]*M[1][1]-M[0][1]*M[1][0];
  const disc=tr*tr-4*det;
  if(disc<-1e-9)return{type:'complex'};
  const sq=Math.sqrt(Math.max(disc,0)), l1=(tr+sq)/2, l2=(tr-sq)/2;
  function ev(lam){
    let vx,vy;
    if(Math.abs(M[0][1])>1e-9){vx=M[0][1];vy=lam-M[0][0];}
    else if(Math.abs(M[1][0])>1e-9){vx=lam-M[1][1];vy=M[1][0];}
    else{vx=1;vy=0;}
    const ln=Math.sqrt(vx*vx+vy*vy);
    return ln<1e-9?null:[vx/ln,vy/ln];
  }
  const v1=ev(l1),v2=ev(l2);
  if(Math.abs(disc)<1e-9){
    const par=!v1||!v2||Math.abs(v1[0]*v2[1]-v1[1]*v2[0])<1e-6;
    if(par)return{type:'defective',l1,l2:l1,v1:v1||[1,0],v2:null};
  }
  return{type:'ok',l1,l2,v1,v2};
}

/* ═══════════════ colors ═══════════════ */
function dk(){return window.matchMedia('(prefers-color-scheme:dark)').matches;}
function col(){
  const d=dk();
  return{
    gMin:  d?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)',
    gMaj:  d?'rgba(255,255,255,0.09)':'rgba(0,0,0,0.09)',
    gTMin: d?'rgba(74,144,217,0.11)':'rgba(37,99,235,0.09)',
    gTMaj: d?'rgba(74,144,217,0.25)':'rgba(37,99,235,0.20)',
    gEMin: d?'rgba(246,173,85,0.11)':'rgba(217,119,6,0.09)',
    gEMaj: d?'rgba(246,173,85,0.26)':'rgba(217,119,6,0.21)',
    /* grey ghost — always represents I */
    ghMin: d?'rgba(150,162,195,0.18)':'rgba(70,80,110,0.14)',
    ghMaj: d?'rgba(150,162,195,0.35)':'rgba(70,80,110,0.28)',
    ghVec: d?'rgba(160,172,205,0.65)':'rgba(70,80,115,0.60)',
    axis:  d?'rgba(255,255,255,0.16)':'rgba(0,0,0,0.16)',
    orig:  d?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)',
    lam1:  d?'#F6AD55':'#D97706',
    lam2:  d?'#C084FC':'#9333EA',
    blue:  d?'#4A90D9':'#2563EB',
    sp1:   d?'rgba(246,173,85,0.65)':'rgba(217,119,6,0.65)',
    sp2:   d?'rgba(192,132,252,0.65)':'rgba(147,51,234,0.65)',
    lbl:   d?'rgba(255,255,255,0.65)':'rgba(0,0,0,0.65)',
  };
}

/* ═══════════════ draw primitives ═══════════════ */
let OX,OY,SC,GR;
function ts(v){return[OX+v[0]*SC,OY-v[1]*SC];}

function grid(alpha,bx,by,cm,cM){
  if(alpha<0.01)return;
  ctx.globalAlpha=alpha;
  for(let i=-GR;i<=GR;i++){
    const maj=i%5===0;
    ctx.strokeStyle=maj?cM:cm;ctx.lineWidth=maj?.8:.5;ctx.setLineDash([]);
    let[x0,y0]=ts([bx[0]*i-by[0]*GR,bx[1]*i-by[1]*GR]);
    let[x1,y1]=ts([bx[0]*i+by[0]*GR,bx[1]*i+by[1]*GR]);
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
    [x0,y0]=ts([by[0]*i-bx[0]*GR,by[1]*i-bx[1]*GR]);
    [x1,y1]=ts([by[0]*i+bx[0]*GR,by[1]*i+bx[1]*GR]);
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
  }
  ctx.globalAlpha=1;
}
function stdGrid(a,c){grid(a,[1,0],[0,1],c.gMin,c.gMaj);}
function ghostGrid(a,c){grid(a,[1,0],[0,1],c.ghMin,c.ghMaj);}

function axes(alpha,c){
  if(alpha<0.01)return;
  ctx.globalAlpha=alpha;ctx.strokeStyle=c.axis;ctx.lineWidth=1;ctx.setLineDash([]);
  let[x0,y0]=ts([-GR,0]),[x1,y1]=ts([GR,0]);
  ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
  [x0,y0]=ts([0,-GR]);[x1,y1]=ts([0,GR]);
  ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
  ctx.globalAlpha=1;
}

function arrow(from,to,color,w,alpha,dash){
  if(alpha<0.01)return;
  const[x1,y1]=ts(from),[x2,y2]=ts(to);
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<2)return;
  const ux=dx/len,uy=dy/len,hw=Math.max(w*3.5,6),hl=Math.max(w*5,10);
  const tx=x2-ux*hl,ty=y2-uy*hl;
  ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=w;ctx.lineCap='round';
  ctx.setLineDash(dash||[]);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(tx,ty);ctx.stroke();
  ctx.setLineDash([]);ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(tx-uy*hw,ty+ux*hw);ctx.lineTo(tx+uy*hw,ty-ux*hw);
  ctx.closePath();ctx.fill();ctx.globalAlpha=1;
}

function eigSpan(dir,color,alpha){
  if(alpha<0.01)return;
  ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=1.3;ctx.setLineDash([6,5]);
  const[sx0,sy0]=ts([-dir[0]*GR,-dir[1]*GR]),[sx1,sy1]=ts([dir[0]*GR,dir[1]*GR]);
  ctx.beginPath();ctx.moveTo(sx0,sy0);ctx.lineTo(sx1,sy1);ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=1;
}

function lbl(vec,text,color,alpha,ox,oy){
  if(alpha<0.01)return;
  const[sx,sy]=ts(vec);
  ctx.globalAlpha=alpha;ctx.fillStyle=color;ctx.font='500 11px JetBrains Mono,monospace';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(text,sx+(ox||12),sy+(oy||0));ctx.globalAlpha=1;
}

function centLbl(text,alpha,yOff){
  if(alpha<0.01)return;
  const[sx,sy]=ts([0,yOff!==undefined?yOff:-1.55]);
  ctx.globalAlpha=alpha*.88;ctx.fillStyle=col().lbl;
  ctx.font='400 10px JetBrains Mono,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,sx,sy);ctx.globalAlpha=1;
}

function dot(v,r,color,alpha){
  if(alpha<0.01)return;
  const[sx,sy]=ts(v);
  ctx.globalAlpha=alpha;ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
}

/* ═══════════════ ghost basis (I) — always grey ═══════════════ */
/* Draws the two grey standard basis arrows, optionally with grid */
function drawGhost(vecAlpha, gridAlpha, c){
  ghostGrid(gridAlpha,c);
  arrow([0,0],[1,0],c.ghVec,1.8,vecAlpha);
  arrow([0,0],[0,1],c.ghVec,1.8,vecAlpha);
  lbl([1,0],'e₁',c.ghVec,vecAlpha*.7);
  lbl([0,1],'e₂',c.ghVec,vecAlpha*.7);
}

/* ═══════════════ MAIN DRAW ═══════════════ */
function draw(){
  A=getA();
  const eig=eigenOf(A);
  const c=col();
  const W=canvas.width/DPR,H=canvas.height/DPR;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.scale(DPR,DPR);
  OX=W/2;OY=H/2;SC=Math.min(W,H)*.155;GR=Math.ceil(Math.max(W,H)/SC)+2;

  updateAnn(step,loc,eig);

  /* ── non-diagonalisable ── */
  if(eig.type!=='ok'){
    stdGrid(1,c);axes(1,c);
    if(eig.type==='defective'&&eig.v1){
      const fa=ease(clamp(loc/.5,0,1));
      eigSpan(eig.v1,c.sp1,fa*.85);
      arrow([0,0],eig.v1,c.lam1,2.5,fa);
      lbl(eig.v1,'v₁  (λ='+eig.l1.toFixed(2)+', only 1 eigenvec)',c.lam1,fa);
    }
    dot([0,0],3.5,c.orig,1);ctx.restore();return;
  }

  const Ae1=matMul(A,[1,0]), Ae2=matMul(A,[0,1]);
  const e=ease(loc);

  /* ════════════ STEP 0: Standard basis ════════════ */
  if(step===0){
    stdGrid(1,c);axes(1,c);
    drawGhost(ease(clamp(loc/.55,0,1)),0,c);
    centLbl('I = standard basis',ease(clamp((loc-.6)/.35,0,1)));
  }

  /* ════════════ STEP 1: Apply X — blue grid transforms, pause at end ════════════ */
  else if(step===1){
    const cbx=[lerp(1,Ae1[0],ease(clamp(loc/.6,0,1))),lerp(0,Ae1[1],ease(clamp(loc/.6,0,1)))];
    const cby=[lerp(0,Ae2[0],ease(clamp(loc/.6,0,1))),lerp(1,Ae2[1],ease(clamp(loc/.6,0,1)))];
    drawGhost(.55,.28,c);
    grid(1,cbx,cby,c.gTMin,c.gTMaj);
    arrow([0,0],cbx,c.blue,2.5,1);arrow([0,0],cby,c.blue,2.5,1);
    lbl(cbx,loc>.5?'Xe₁':'e₁→Xe₁',c.blue,1);
    lbl(cby,loc>.5?'Xe₂':'e₂→Xe₂',c.blue,1);
    /* pause label fades in once transform is done */
    centLbl('Xe₁ and Xe₂: scaled and rotated away from e₁, e₂',ease(clamp((loc-.65)/.3,0,1)));
  }

  /* ════════════ STEP 2: Apply X⁻¹ — reset back to I ════════════ */
  else if(step===2){
    const cbx=[lerp(Ae1[0],1,e),lerp(Ae1[1],0,e)];
    const cby=[lerp(Ae2[0],0,e),lerp(Ae2[1],1,e)];
    drawGhost(.55,.28,c);
    grid(1-e,cbx,cby,c.gTMin,c.gTMaj);
    arrow([0,0],cbx,c.blue,2.5,1-e);
    arrow([0,0],cby,c.blue,2.5,1-e);
    centLbl('X⁻¹X = I — every vector returns to its original direction',ease(clamp(loc/.5,0,1)));
  }

  /* ════════════ STEP 3: Introduce eigenvectors ════════════ */
  else if(step===3){
    stdGrid(1,c);axes(1,c);
    drawGhost(lerp(.55,.16,e),0,c);
    const spA=ease(clamp((loc-.15)/.4,0,1));
    eigSpan(eig.v1,c.sp1,spA*.9);eigSpan(eig.v2,c.sp2,spA*.9);
    const vecA=ease(clamp((loc-.4)/.45,0,1));
    arrow([0,0],eig.v1,c.lam1,2.5,vecA);arrow([0,0],eig.v2,c.lam2,2.5,vecA);
    lbl(eig.v1,'v₁  (λ₁='+eig.l1.toFixed(2)+')',c.lam1,vecA);
    lbl(eig.v2,'v₂  (λ₂='+eig.l2.toFixed(2)+')',c.lam2,vecA);
    centLbl('Xvᵢ = λᵢvᵢ — these directions are only scaled by X, never rotated',ease(clamp((loc-.7)/.25,0,1)));
  }

  /* ════════════ STEP 4: Apply X again — grey grid transforms, eigenvecs scale in place ════════════ */
  else if(step===4){
    const cbx=[lerp(1,Ae1[0],e),lerp(0,Ae1[1],e)];
    const cby=[lerp(0,Ae2[0],e),lerp(1,Ae2[1],e)];
    grid(1,cbx,cby,c.ghMin,c.ghMaj);
    arrow([0,0],cbx,c.ghVec,1.8,1);arrow([0,0],cby,c.ghVec,1.8,1);
    lbl(cbx,loc>.5?'Xe₁':'e₁',c.ghVec,.7);lbl(cby,loc>.5?'Xe₂':'e₂',c.ghVec,.7);
    eigSpan(eig.v1,c.sp1,.92);eigSpan(eig.v2,c.sp2,.92);
    const sv1=[eig.v1[0]*lerp(1,eig.l1,e),eig.v1[1]*lerp(1,eig.l1,e)];
    const sv2=[eig.v2[0]*lerp(1,eig.l2,e),eig.v2[1]*lerp(1,eig.l2,e)];
    arrow([0,0],sv1,c.lam1,2.5,1);arrow([0,0],sv2,c.lam2,2.5,1);
    lbl(sv1,loc>.3?'Xv₁='+eig.l1.toFixed(2)+'·v₁':'v₁',c.lam1,1);
    lbl(sv2,loc>.3?'Xv₂='+eig.l2.toFixed(2)+'·v₂':'v₂',c.lam2,1);
    centLbl('Eigenvector spans invariant — X scales but does not rotate them',ease(clamp((loc-.65)/.28,0,1)));
  }

  /* ════════════ STEP 5: Reset grey grid back to I ════════════ */
  else if(step===5){
    const cbx=[lerp(Ae1[0],1,e),lerp(Ae1[1],0,e)];
    const cby=[lerp(Ae2[0],0,e),lerp(Ae2[1],1,e)];
    grid(1,cbx,cby,c.ghMin,c.ghMaj);
    arrow([0,0],cbx,c.ghVec,1.8,1);arrow([0,0],cby,c.ghVec,1.8,1);
    eigSpan(eig.v1,c.sp1,.75);eigSpan(eig.v2,c.sp2,.75);
    arrow([0,0],eig.v1,c.lam1,2.5,1);arrow([0,0],eig.v2,c.lam2,2.5,1);
    lbl(eig.v1,'v₁',c.lam1,1);lbl(eig.v2,'v₂',c.lam2,1);
    centLbl('X = P·D·P⁻¹ — decomposing X into three geometric steps',ease(clamp((loc-.55)/.35,0,1)));
  }

  /* ════════════ STEP 6: P⁻¹ — change of basis into eigenvectors ════════════ */
  else if(step===6){
    ghostGrid(lerp(.35,0,e),c);
    grid(e,eig.v1,eig.v2,c.gEMin,c.gEMaj);
    arrow([0,0],[1,0],c.ghVec,1.8,lerp(.55,0,e));
    arrow([0,0],[0,1],c.ghVec,1.8,lerp(.55,0,e));
    eigSpan(eig.v1,c.sp1,.85);eigSpan(eig.v2,c.sp2,.85);
    const bx=[lerp(1,eig.v1[0],e),lerp(0,eig.v1[1],e)];
    const by=[lerp(0,eig.v2[0],e),lerp(1,eig.v2[1],e)];
    arrow([0,0],bx,c.lam1,2.5,1);arrow([0,0],by,c.lam2,2.5,1);
    lbl(bx,loc<.5?'e₁ → v₁':'v₁',c.lam1,1);lbl(by,loc<.5?'e₂ → v₂':'v₂',c.lam2,1);
    centLbl('P⁻¹ · v: any vector re-expressed as a combination of eigenvectors',ease(clamp((loc-.35)/.35,0,1)));
  }

  /* ════════════ STEP 7: D — apply X in the eigenbasis (diagonal action) ════════════ */
  else if(step===7){
    /* In the eigenbasis, X IS D — no rotation, independent axis scaling.
       The eigenbasis grid scales along v1 by λ1 and along v2 by λ2. */
    const s1=lerp(1,eig.l1,e), s2=lerp(1,eig.l2,e);
    const cbx=[eig.v1[0]*s1,eig.v1[1]*s1], cby=[eig.v2[0]*s2,eig.v2[1]*s2];
    grid(1,cbx,cby,c.gEMin,c.gEMaj);
    eigSpan(eig.v1,c.sp1,.7);eigSpan(eig.v2,c.sp2,.7);
    arrow([0,0],cbx,c.lam1,2.5,1);arrow([0,0],cby,c.lam2,2.5,1);
    lbl(cbx,'λ₁·v₁  (×'+eig.l1.toFixed(2)+')',c.lam1,1);
    lbl(cby,'λ₂·v₂  (×'+eig.l2.toFixed(2)+')',c.lam2,1);
    const dLabel='In eigenbasis: X acts as D = diag('+eig.l1.toFixed(2)+', '+eig.l2.toFixed(2)+') — pure scaling, no rotation';
    centLbl(dLabel,ease(clamp((loc-.45)/.38,0,1)));
  }

  /* ════════════ STEP 8: P — rotate back to standard coordinates ════════════ */
  else if(step===8){
    /* P maps the scaled eigenbasis back to standard coordinates.
       λᵢvᵢ → Xeᵢ  (the columns of X).
       P·D·P⁻¹·eᵢ = Xeᵢ — the result is still scaled. To recover eᵢ
       you would need X⁻¹ = P·D⁻¹·P⁻¹. */
    const startCbx=[eig.v1[0]*eig.l1,eig.v1[1]*eig.l1];
    const startCby=[eig.v2[0]*eig.l2,eig.v2[1]*eig.l2];
    const cbx=[lerp(startCbx[0],Ae1[0],e),lerp(startCbx[1],Ae1[1],e)];
    const cby=[lerp(startCby[0],Ae2[0],e),lerp(startCby[1],Ae2[1],e)];
    grid(1,cbx,cby,c.gTMin,c.gTMaj);
    ghostGrid(e*.4,c);
    eigSpan(eig.v1,c.sp1,(1-e)*.7);eigSpan(eig.v2,c.sp2,(1-e)*.7);
    arrow([0,0],cbx,loc<.5?c.lam1:c.blue,2.5,1);
    arrow([0,0],cby,loc<.5?c.lam2:c.blue,2.5,1);
    drawGhost(e*.45,0,c);
    lbl(cbx,loc>.55?'Xe₁ = P·D·P⁻¹·e₁':'λ₁v₁ →',loc>.55?c.blue:c.lam1,1);
    lbl(cby,loc>.55?'Xe₂ = P·D·P⁻¹·e₂':'λ₂v₂ →',loc>.55?c.blue:c.lam2,1);
    if(loc>.65){
      const fa=ease(clamp((loc-.65)/.28,0,1));
      centLbl('X = P·D·P⁻¹ ✓  Result is Xe — still scaled. X⁻¹ = P·D⁻¹·P⁻¹ would return to I.',fa);
    }
  }

  dot([0,0],3.5,c.orig,1);ctx.restore();
}

/* ═══════════════ annotations ═══════════════ */
const ANNS=[
  /* 0 */
  ()=>`<strong>Step 1 · Standard basis.</strong> The grey vectors are <strong>e₁ = [1,0]</strong> and <strong>e₂ = [0,1]</strong> — the columns of the identity I. Every vector in ℝ² is a unique linear combination of e₁ and e₂.`,
  /* 1 */
  ()=>`<strong>Step 2 · Multiplying by X.</strong> X maps e₁ → Xe₁ and e₂ → Xe₂ (the columns of X). For a generic vector, Xv rotates <em>and</em> scales — the output points in a different direction from the input. The question eigendecomposition answers: <em>are there any directions X leaves invariant?</em>`,
  /* 2 */
  ()=>`<strong>Step 3 · Multiplying by X⁻¹.</strong> X⁻¹X = I — every vector is returned to its original direction. X⁻¹ is the exact inverse transformation: it undoes every rotation and scaling that X applied.`,
  /* 3 */
  (l,eig)=>`<strong>Step 4 · Eigenvectors.</strong> Xvᵢ = λᵢvᵢ — the eigenvectors are the special directions that X <em>only scales</em>, never rotates. Their spans (the dashed lines) are invariant subspaces of X. For this matrix: <span class="o">λ₁ = ${eig.l1.toFixed(3)}</span>, <span class="p">λ₂ = ${eig.l2.toFixed(3)}</span>.`,
  /* 4 */
  (l,eig)=>`<strong>Step 5 · Xv = λv.</strong> The grey grid distorts under X — most directions rotate. But the eigenvector spans are pinned: X maps <span class="o">v₁ → λ₁v₁ = ${eig.l1.toFixed(2)}·v₁</span> and <span class="p">v₂ → λ₂v₂ = ${eig.l2.toFixed(2)}·v₂</span>. The arrows grow along their own lines — no rotation whatsoever.`,
  /* 5 */
  ()=>`<strong>Step 6 · X = P·D·P⁻¹.</strong> Eigendecomposition expresses X as three sequential operations: (1) re-express in the eigenbasis (P⁻¹), (2) apply X — which in the eigenbasis acts diagonally (D), (3) convert back to standard coordinates (P). The space returns to I as the starting point for this decomposition.`,
  /* 6 */
  ()=>`<strong>Step 7 · P⁻¹ — change of basis.</strong> P = [v₁ | v₂] has the eigenvectors as columns. Multiplying by P⁻¹ re-expresses every vector in terms of eigenvector components. In this eigenbasis coordinate frame, X has no off-diagonal entries — it cannot mix the two axes.`,
  /* 7 */
  (l,eig)=>`<strong>Step 8 · D — X in the eigenbasis.</strong> In eigenbasis coordinates, <em>multiplying by X is the same as multiplying by D</em> = diag(λ₁, λ₂). This is because the eigenvectors diagonalise X: D is not a separate matrix — it <em>is</em> X, seen from the right coordinate frame. It scales the <span class="o">v₁</span>-component by <span class="o">λ₁ = ${eig.l1.toFixed(3)}</span> and the <span class="p">v₂</span>-component by <span class="p">λ₂ = ${eig.l2.toFixed(3)}</span>, with zero mixing between axes.`,
  /* 8 */
  ()=>`<strong>Step 9 · P — back to standard coordinates.</strong> P maps from the eigenbasis back to standard coordinates. The full product P·D·P⁻¹·eᵢ = Xeᵢ — the result is the same as X applied directly. <strong>The vectors are still scaled</strong> (that is what X does). To recover eᵢ you would need to also apply X⁻¹ = P·D⁻¹·P⁻¹.`,
];

function updateAnn(s,l,eig){
  const el=document.getElementById('ann');
  if(eig.type==='complex'){
    el.innerHTML='<strong>Complex eigenvalues:</strong> tr²−4·det < 0. This matrix is a rotation-scaling with no real invariant direction — P·D·P⁻¹ over ℝ is impossible.';return;
  }
  if(eig.type==='defective'){
    el.innerHTML='<strong>Defective matrix:</strong> λ=<span class="o">'+eig.l1.toFixed(2)+'</span> has algebraic multiplicity 2 but geometric multiplicity 1 — only one independent eigenvector. P cannot be full-rank, so P·D·P⁻¹ does not exist. Use Jordan decomposition instead.';return;
  }
  const fn=ANNS[s];
  el.innerHTML=fn(l,eig||{});
}

/* ═══════════════ stats ═══════════════ */
function updateStats(){
  A=getA();const eig=eigenOf(A);
  const tr=A[0][0]+A[1][1],det=A[0][0]*A[1][1]-A[0][1]*A[1][0];
  document.getElementById('st-tr').textContent=tr.toFixed(2);
  document.getElementById('st-det').textContent=det.toFixed(2);
  const l1e=document.getElementById('st-l1'),l2e=document.getElementById('st-l2');
  const v1e=document.getElementById('st-v1'),v2e=document.getElementById('st-v2');
  if(eig.type==='complex'){
    l1e.textContent='cmplx';l1e.className='sv r';l2e.textContent='cmplx';l2e.className='sv r';
    v1e.textContent='—';v2e.textContent='—';
  }else if(eig.type==='defective'){
    l1e.textContent=eig.l1.toFixed(2);l1e.className='sv o';
    l2e.textContent=eig.l2.toFixed(2)+' ×2';l2e.className='sv p';
    v1e.textContent=eig.v1?'['+eig.v1[0].toFixed(2)+','+eig.v1[1].toFixed(2)+']':'—';
    v2e.textContent='— defective';
  }else{
    l1e.textContent=eig.l1.toFixed(2);l1e.className='sv o';
    l2e.textContent=eig.l2.toFixed(2);l2e.className='sv p';
    v1e.textContent=eig.v1?'['+eig.v1[0].toFixed(2)+','+eig.v1[1].toFixed(2)+']':'—';
    v2e.textContent=eig.v2?'['+eig.v2[0].toFixed(2)+','+eig.v2[1].toFixed(2)+']':'—';
  }
}

/* ═══════════════ UI ═══════════════ */
function updateUI(){
  const prev=document.getElementById('btn-prev'),next=document.getElementById('btn-next');
  const lbl=document.getElementById('step-label');
  lbl.textContent='Step '+(step+1)+' / '+N;
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.remove('active','done');
    if(i<step)d.classList.add('done');
    if(i===step)d.classList.add('active');
  });
  document.querySelectorAll('.pb').forEach((b,i)=>b.classList.toggle('active',i===step));
  prev.disabled=step===0;
  const eig=eigenOf(getA());
  const blocked=eig.type!=='ok'&&step>=1;
  if(animating){
    next.textContent='· · ·';next.disabled=true;
    next.classList.add('anim');next.classList.remove('primary');
  }else if(blocked){
    next.textContent='N/A';next.disabled=true;
    next.classList.remove('anim','primary');
  }else if(!done){
    next.textContent=step===0?'Start ▶':'Play ▶';
    next.disabled=false;next.classList.add('primary');next.classList.remove('anim');
  }else if(step<N-1){
    next.textContent='Next →';
    next.disabled=false;next.classList.add('primary');next.classList.remove('anim');
  }else{
    next.textContent='Done ✓';next.disabled=true;next.classList.remove('primary','anim');
  }
}

function startAnim(){
  if(animating)return;
  animating=true;done=false;lastTs=null;updateUI();
  raf=requestAnimationFrame(frame);
}
function frame(ts){
  if(!animating)return;
  if(lastTs===null)lastTs=ts;
  const dt=(ts-lastTs)/1e3;lastTs=ts;
  loc=Math.min(loc+dt/TOTAL[step],1);
  A=getA();updateStats();draw();
  if(loc>=1){animating=false;done=true;updateUI();return;}
  raf=requestAnimationFrame(frame);
}
function stopAnim(){animating=false;if(raf){cancelAnimationFrame(raf);raf=null;}}

function jumpTo(p){
  stopAnim();step=clamp(p,0,N-1);loc=0;done=false;
  A=getA();updateStats();draw();updateUI();
}
function resetAll(){stopAnim();step=0;loc=0;done=false;A=getA();draw();updateUI();}

document.getElementById('btn-next').addEventListener('click',()=>{
  if(animating)return;
  if(!done){startAnim();}
  else if(step<N-1){step++;loc=0;done=false;updateUI();startAnim();}
});
document.getElementById('btn-prev').addEventListener('click',()=>{
  if(animating)stopAnim();
  if(step>0){step--;loc=1;done=true;}else{loc=0;done=false;}
  A=getA();updateStats();draw();updateUI();
});
document.getElementById('btn-reset').addEventListener('click',()=>resetAll());
['a00','a01','a10','a11'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{A=getA();updateStats();draw();updateUI();});
});

function resize(){
  const w=canvas.parentElement.clientWidth,h=Math.min(480,Math.round(w*.6));
  canvas.width=w*DPR;canvas.height=h*DPR;canvas.style.height=h+'px';draw();
}
window.addEventListener('resize',resize);
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>draw());
resize();updateStats();updateUI();draw();
</script>
</body>
</html>
